<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>PI WEB</title>
    <meta name="theme-color" content="#0d1117" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <link rel="apple-touch-icon" href="%BASE_URL%apple-touch-icon.png" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <style>
      :root {
        color-scheme: dark;
        --pi-control-font-size: 16px;
        --pi-control-font-family: system-ui, sans-serif;
        --pi-control-monospace-font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        /* Structural theme hooks inherit into Lit shadow trees. Existing themes
           need not define them: each use includes a stock fallback. */
        --pi-body-font-family: system-ui, sans-serif;
        --pi-heading-font-family: system-ui, sans-serif;
        --pi-heading-font-weight: 700;
        --pi-radius-control: 8px;
        --pi-divider-width: 1px;
        /* Semantic structural defaults preserve Classic and PI WEB exactly. */
        --pi-pill-radius: 999px;
        --pi-chat-card-radius: 10px;
        --pi-chat-inline-card-radius: 8px;
        --pi-inline-code-radius: 4px;
        --pi-code-block-radius: 8px;
        --pi-diff-inline-radius: 2px;
        --pi-diff-panel-radius: 7px;
        --pi-meter-marker-radius: 50%;
        --pi-meter-marker-border-width: 2px;
        --pi-selected-nav-color: var(--pi-text);
        --pi-selected-nav-font-weight: 400;
        --pi-tool-error-card-border: var(--pi-danger);
        --pi-tool-error-card-background: color-mix(in srgb, var(--pi-danger) 10%, var(--pi-bg));
        --pi-tool-error-card-border-width: 1px;
        --pi-tool-error-header-rule-width: 0px;
        --pi-tool-error-header-rule-color: var(--pi-danger);
        --pi-tool-error-header-padding-bottom: 0px;
        --pi-tool-error-icon-color: var(--pi-muted);
        --pi-tool-error-icon-weight: 400;
        --pi-tool-error-icon-size: auto;
        --pi-tool-error-icon-font-size: inherit;
        --pi-tool-error-icon-stroke-width: 0px;
        --pi-tool-error-text-color: var(--pi-danger);
        --pi-tool-error-text-background: color-mix(in srgb, var(--pi-danger) 10%, var(--pi-bg));
        --pi-tool-error-text-border-width: 1px;
        --pi-tool-error-text-border-radius: 7px;
        /* A running tool is the legacy muted dot unless a theme opts into a spinner. */
        --pi-tool-running-indicator-glyph-font-size: inherit;
        --pi-tool-running-indicator-display: inline;
        --pi-tool-running-indicator-spinner-size: auto;
        --pi-tool-running-indicator-spinner-border-width: 0px;
        --pi-tool-running-indicator-spinner-border-right-color: currentColor;
        --pi-tool-running-indicator-animation: none;
        --pi-accent-rule-width: 0.25rem;
        --pi-code-surface-rule-width: 0px;
        --pi-unified-diff-remove-color: var(--pi-text);
        --pi-unified-diff-remove-decoration: none;
        --pi-list-heading-letter-spacing: normal;
        --pi-label-letter-spacing: normal;
        --pi-navigation-heading-letter-spacing: normal;
        --pi-space-1: 0.25rem;
        --pi-space-2: 0.5rem;
        --pi-space-3: 0.75rem;
        --pi-space-4: 1rem;
        --pi-space-6: 1.5rem;
        --pi-space-8: 2rem;
        --pi-focus-ring-width: 2px;
        --pi-focus-ring-offset: 2px;
        --pi-navigation-panel-size: 340px;
        /* Session-surface hooks keep the stock presentation as their fallback.
           Modernist changes their values rather than relying on component-private selectors. */
        --pi-transcript-font-size: 0.875rem;
        --pi-transcript-line-height: 1.45;
        --pi-chat-padding: 1.625rem 1rem 4rem;
        --pi-chat-message-padding: 0.75rem;
        --pi-chat-assistant-background: var(--pi-surface);
        --pi-chat-assistant-border: var(--pi-border);
        --pi-chat-user-max-width: 100%;
        --pi-chat-header-shadow: 0 8px 18px var(--pi-shadow-soft);
        --pi-tool-pending-border-style: solid;
        --pi-tool-success-background: var(--pi-success-bg);
        --pi-code-background: var(--pi-bg);
        --pi-diff-add-rule: 0px solid transparent;
        --pi-diff-remove-rule: 0px solid transparent;
        --pi-diff-remove-color: var(--pi-danger);
        --pi-diff-remove-decoration: none;
        --pi-bg: #0d1117;
        --pi-surface: #161b22;
        --pi-surface-hover: #21262d;
        --pi-terminal-bg: #05070a;
        --pi-terminal-text: #e6edf3;
        --pi-border: #30363d;
        --pi-border-muted: #21262d;
        --pi-text: #e6edf3;
        --pi-text-secondary: #c9d1d9;
        --pi-text-bright: #f0f6fc;
        --pi-muted: #8b949e;
        --pi-dim: #6e7681;
        --pi-accent: #58a6ff;
        --pi-accent-border: #2f81f7;
        --pi-selection-bg: #0d2847;
        --pi-success: #3fb950;
        --pi-success-border: #238636;
        --pi-success-bg: #0f1b12;
        --pi-success-surface: #0f2a16;
        --pi-success-ring: #3fb95055;
        --pi-warning: #d29922;
        --pi-warning-border: #6e5200;
        --pi-warning-surface: #1f1a10;
        --pi-danger: #ff7b72;
        --pi-purple: #d2a8ff;
        --pi-purple-border: #a371f7;
        --pi-purple-surface: #21132f;
        --pi-overlay: #0008;
        --pi-shadow-soft: #0006;
        --pi-shadow: #0008;
        --pi-shadow-strong: #000b;
        --pi-bg-overlay-soft: #0d1117dd;
        --pi-bg-overlay: #0d1117e6;
        --pi-success-bg-overlay: #0f1b12ee;
        --pi-terminal-selection: #264f78;
      }
      :root[data-pi-web-theme^="themes:modernist-"] {
        --pi-body-font-family: "Archivo", system-ui, sans-serif;
        --pi-control-font-family: "Archivo", system-ui, sans-serif;
        --pi-heading-font-family: "Archivo", system-ui, sans-serif;
        --pi-heading-font-weight: 800;
        --pi-radius-control: 0px;
        --pi-divider-width: 2px;
        --pi-pill-radius: 0px;
        --pi-chat-card-radius: 0px;
        --pi-chat-inline-card-radius: 0px;
        --pi-inline-code-radius: 0px;
        --pi-code-block-radius: 0px;
        --pi-diff-inline-radius: 0px;
        --pi-diff-panel-radius: 0px;
        --pi-meter-marker-radius: 0px;
        --pi-meter-marker-border-width: 2px;
        --pi-selected-nav-color: var(--pi-accent-border);
        --pi-selected-nav-font-weight: 600;
        --pi-tool-error-card-border: var(--pi-text);
        --pi-tool-error-card-background: transparent;
        --pi-tool-error-card-border-width: 2px;
        --pi-tool-error-header-rule-width: 2px;
        --pi-tool-error-header-rule-color: var(--pi-text);
        --pi-tool-error-header-padding-bottom: 0.5rem;
        --pi-tool-error-icon-color: var(--pi-text);
        --pi-tool-error-icon-weight: 800;
        --pi-tool-error-icon-size: 0.75rem;
        --pi-tool-error-icon-font-size: 0px;
        --pi-tool-error-icon-stroke-width: 2px;
        --pi-tool-error-text-color: var(--pi-text);
        --pi-tool-error-text-background: transparent;
        --pi-tool-error-text-border-width: 0px 0px 0px 2px;
        --pi-tool-error-text-border-radius: 0px;
        --pi-tool-running-indicator-glyph-font-size: 0px;
        --pi-tool-running-indicator-display: inline-grid;
        --pi-tool-running-indicator-spinner-size: 0.75rem;
        --pi-tool-running-indicator-spinner-border-width: 2px;
        --pi-tool-running-indicator-spinner-border-right-color: transparent;
        --pi-tool-running-indicator-animation: tool-spin 0.8s linear infinite;
        --pi-accent-rule-width: 2px;
        --pi-code-surface-rule-width: var(--pi-divider-width);
        --pi-unified-diff-remove-color: var(--pi-muted);
        --pi-unified-diff-remove-decoration: line-through;
        --pi-list-heading-letter-spacing: 0.08em;
        --pi-label-letter-spacing: 0.06em;
        --pi-navigation-heading-letter-spacing: -0.015em;
        --pi-navigation-panel-size: 16.5rem;
        --pi-transcript-font-size: 0.9375rem;
        --pi-transcript-line-height: 1.55;
        --pi-chat-padding: 2rem 1.5rem 4.5rem;
        --pi-chat-message-padding: 0.875rem;
        --pi-chat-assistant-background: transparent;
        --pi-chat-assistant-border: transparent;
        --pi-chat-user-max-width: min(78%, 48rem);
        --pi-chat-header-shadow: none;
        --pi-tool-pending-border-style: dashed;
        --pi-tool-success-background: var(--pi-surface);
        --pi-code-background: var(--pi-surface);
        --pi-diff-add-rule: 0.1875rem solid var(--pi-accent);
        --pi-diff-remove-rule: 0.1875rem solid var(--pi-border);
        --pi-diff-remove-color: var(--pi-muted);
        --pi-diff-remove-decoration: line-through;
      }
      html, body { margin: 0; height: 100%; overflow: hidden; background: var(--pi-bg); color: var(--pi-text); }
      body { min-height: 100dvh; font-family: var(--pi-body-font-family, system-ui, sans-serif); }
    </style>
  </head>
  <body>
    <pi-web-app></pi-web-app>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
